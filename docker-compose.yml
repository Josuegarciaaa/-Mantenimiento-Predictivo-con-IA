version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: predmaint_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: predictive_maintenance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ml:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: predmaint_ml
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/predictive_maintenance
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./ml_service/models:/usr/src/app/models
    depends_on:
      - db

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: predmaint_mlflow
    restart: always
    ports:
      - "5001:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://postgres:postgrespassword@db:5432/predictive_maintenance
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    command: >
      sh -c "pip install psycopg2-binary && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://postgres:postgrespassword@db:5432/predictive_maintenance --default-artifact-root /mlflow/artifacts"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: predmaint_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://postgres:postgrespassword@db:5432/predictive_maintenance
      - PYTHON_SERVICE_URL=http://ml:5000
      - JWT_SECRET=supersecretmaintenancekey
      - FRONTEND_URL=http://localhost:5173
      - NODE_ENV=production
    depends_on:
      - db
      - ml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: predmaint_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:3001
    depends_on:
      - backend

volumes:
  pgdata:
  mlflow_data:
