name: Enterprise MLOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build-ml:
    name: ML Model Training & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_service/requirements.txt
          
      - name: Lint with flake8
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 ml_service/ --count --select=E9,F63,F7,F82 --show-source --statistics
          
      - name: Build ML Docker Image
        run: docker build -t predmaint-ml:latest ./ml_service

  build-backend:
    name: Node.js Backend Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
      
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci || npm install
        
      - name: Build Backend Docker Image
        run: docker build -t predmaint-backend:latest ./backend

  build-frontend:
    name: React Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install
        
      - name: Build Production Bundle
        working-directory: ./frontend
        run: npm run build
